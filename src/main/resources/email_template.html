<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px;">
<div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
    <h2 style="color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px;">
        XÁC THỰC TÀI KHOẢN
    </h2>

    <p>Xin chào <strong>{{name}}</strong>,</p>

    <p>Cảm ơn bạn đã đăng ký tài khoản tại hệ thống E-Learning.</p>
    <p>Đây là mã xác thực (OTP) của bạn:</p>

    <div style="text-align: center; margin: 30px 0;">
            <span style="font-size: 32px; font-weight: bold; letter-spacing: 5px; color: #e74c3c; background: #ffe6e6; padding: 10px 20px; border-radius: 5px; border: 1px dashed #e74c3c;">
                {{otp}}
            </span>
    </div>

    <p>Mã này sẽ hết hiệu lực sau <strong>1 phút</strong>. Vui lòng không chia sẻ mã này cho bất kỳ ai.</p>

    <br>
    <p style="font-size: 14px; color: #7f8c8d;">
        Trân trọng,<br>
        Đội ngũ hỗ trợ kỹ thuật.
    </p>
</div>
</body>
</html>
